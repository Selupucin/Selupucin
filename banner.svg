<svg width="1200" height="240" viewBox="0 0 1200 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Selupucin - Full-Stack Developer and Designer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d2e23"/>
      <stop offset="0.5" stop-color="#1a936f"/>
      <stop offset="1" stop-color="#42b883"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- base -->
  <rect width="1200" height="240" fill="url(#bg)"/>
  <rect width="1200" height="240" fill="url(#fade)"/>

  <!-- decorative waves -->
  <path d="M0 190 C 200 150, 380 230, 600 195 S 1000 150, 1200 190 L1200 240 L0 240 Z" fill="#ffffff" fill-opacity="0.08"/>
  <path d="M0 212 C 240 180, 420 245, 640 215 S 1010 185, 1200 212 L1200 240 L0 240 Z" fill="#ffffff" fill-opacity="0.10"/>

  <!-- soft dots -->
  <circle cx="120" cy="60" r="3" fill="#ffffff" fill-opacity="0.25"/>
  <circle cx="1080" cy="80" r="4" fill="#ffffff" fill-opacity="0.20"/>
  <circle cx="980" cy="48" r="2.5" fill="#ffffff" fill-opacity="0.30"/>
  <circle cx="180" cy="150" r="2.5" fill="#ffffff" fill-opacity="0.20"/>

  <!-- text -->
  <text x="600" y="118" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="800" fill="#ffffff" letter-spacing="1">Selupucin</text>
  <text x="600" y="158" text-anchor="middle" font-family="'Fira Code', 'Courier New', monospace" font-size="21" font-weight="500" fill="#ffffff" fill-opacity="0.92" letter-spacing="3">Full-Stack Developer &amp; Designer</text>
</svg>
